# job-radar configuration
# This is the ONE file you need to edit. Run `/job-radar configure` to set it up interactively.
# portals.yml (which companies to scan) is managed via `/job-radar add company` — you rarely need to edit it directly.

name: Your Name
email: you@example.com
location: City, State/Country     # where you live — used for commute scoring
timezone: America/New_York

targets:
  roles:
    - Senior Software Engineer
    - Staff Engineer
    - Engineering Manager
    - Director of Engineering
  min_score: 3.5  # don't apply below this

work_arrangement:
  preference: remote              # remote | hybrid | onsite | any
  home_zip: ""                    # your home zip code — auto-detects any city within local_radius_miles
  local_radius_miles: 100         # cities within this radius appear in the local pick list tier
                                  # set to match max_commute_miles for commute-only; higher to include nearby metros
  local_search_terms: []          # city names for targeted Workday searches, e.g. ["San Antonio", "Austin"]
  max_commute_miles: 30           # one-way max; only used when preference is hybrid or onsite
  willing_to_relocate: false      # true | false
  relocation_cities: []           # e.g., ["Austin, TX", "New York, NY"] — only if willing_to_relocate: true

preferences:
  company_size: any               # startup | mid | enterprise | any
  deal_breakers: []               # e.g., ["no equity", "defense contractor"]

resume:
  max_pages: 2                    # hard limit for tailored resumes
  no_cross_references: true       # never mention one employer's work in another's bullets

cover_letter:
  max_pages: 1                    # hard limit for tailored cover letters

compensation:
  currency: USD
  min: 150000       # won't apply below this
  target: 200000    # bottom of your target range
  target_max: 225000  # top of your target range (optional)

resume_builder:
  role_type: manager        # manager | ic | director | hybrid
                            # manager  → lead bullets with team/org impact: headcount, budget, cross-functional ownership
                            # ic       → lead bullets with technical achievements: systems built, architecture, scale
                            # director → lead bullets with business/program impact: strategy, P&L, stakeholder influence
                            # hybrid   → balance delivery ownership with hands-on technical depth
  seniority: senior         # junior | mid | senior | principal | executive
  industries:               # industries to emphasize in bullets and cover letters
    - software engineering
