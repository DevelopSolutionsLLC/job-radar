# What job titles are you looking for?
# Tip: use /job-radar add role "Title" or /job-radar remove role "Title"
title_filter:
  positive:
    - engineer
    - developer
    - software
    - director
    - manager
    - architect
    - lead
    - principal
  negative:
    - intern
    - junior
    - contractor
    - part-time
    - temporary
    - volunteer
    - unpaid
    - recruiter
    - sales
    - marketing
    - customer success

